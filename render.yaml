services:
  - type: web
    name: global-market-backend
    env: python
    region: ohio
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: APP_ENV
        value: production
      # - key: TELEGRAM_BOT_TOKEN
      #   sync: false # Set in Render Dashboard
      # - key: TELEGRAM_CHAT_ID
      #   sync: false # Set in Render Dashboard

staticSites:
  - name: global-market-frontend
    env: static
    region: ohio
    buildCommand: bun install && bun run build
    publishPath: dist
    envVars:
      - key: BUN_VERSION
        value: latest
      - key: VITE_API_URL
        fromService:
          type: web
          name: global-market-backend
          property: host
      - key: VITE_WS_URL
        fromService:
          type: web
          name: global-market-backend
          property: host
